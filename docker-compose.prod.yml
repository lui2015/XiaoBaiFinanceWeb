# 生产部署 compose（SQLite 版，无需独立数据库）
# 数据存于容器卷 app_data（/app/data/xiaobai.db），App 直接读写
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiaobai-finance-web:latest
    container_name: xb_app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "8095:8093"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    networks: [xb_net]

volumes:
  app_data: {}
  app_uploads: {}

networks:
  xb_net:
    driver: bridge
